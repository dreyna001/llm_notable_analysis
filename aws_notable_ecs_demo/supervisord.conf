[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:backend]
; NOTE: gunicorn default timeout is 30s; LLM calls can exceed that.
; Tune via env vars if needed (see README.md).
command=python3 -m gunicorn \
  -w %(ENV_GUNICORN_WORKERS)s \
  -b 127.0.0.1:8080 \
  --timeout %(ENV_GUNICORN_TIMEOUT)s \
  --graceful-timeout %(ENV_GUNICORN_GRACEFUL_TIMEOUT)s \
  --keep-alive %(ENV_GUNICORN_KEEPALIVE)s \
  backend:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED=1,GUNICORN_WORKERS=2,GUNICORN_TIMEOUT=180,GUNICORN_GRACEFUL_TIMEOUT=30,GUNICORN_KEEPALIVE=2

