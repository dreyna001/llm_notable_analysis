<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notable Analysis Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Notable Analysis Demo</h1>
            <p class="subtitle">MITRE ATT&CK TTP Analysis powered by AWS Bedrock Nova Pro</p>
            <p class="gdit-credit">Developed by GDIT</p>
        </div>
        
        <div class="form-section">
            <div class="form-group">
                <label for="rawInput">Alert Text or Paste JSON:</label>
                <textarea id="rawInput" placeholder="Paste your security alert text or JSON here..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="fileInput">Or Upload a File (JSON or Text):</label>
                <input type="file" id="fileInput" accept=".json,.txt,.log">
            </div>
            
            <div class="form-group">
                <label>Payload Type:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="payloadType" value="raw_text" checked>
                        Raw Text
                    </label>
                    <label>
                        <input type="radio" name="payloadType" value="raw_json">
                        Raw JSON
                    </label>
                </div>
            </div>
            
            
            <button id="analyzeBtn" onclick="analyzeAlert()">Analyze Alert</button>
        </div>
        
        <div id="status"></div>
        
        <div id="results">
            <h2>Analysis Results</h2>
            <div id="markdownOutput"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
