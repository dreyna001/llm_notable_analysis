name: notable-analyzer-service

services:
  model-serving:
    image: ${MODEL_SERVING_IMAGE:-vllm/vllm-openai:v0.14.1}
    restart: unless-stopped
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    gpus:
      - driver: nvidia
        count: "${MODEL_SERVING_GPU_COUNT:-all}"
    ipc: host
    shm_size: "${MODEL_SERVING_SHM_SIZE:-8gb}"
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    command:
      - python
      - -m
      - vllm.entrypoints.openai.api_server
      - --model
      - /models/${VLLM_MODEL_DIRNAME:-gpt-oss-120b}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:-gpt-oss-120b}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.9}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-131072}"
      - --dtype
      - "${VLLM_DTYPE:-auto}"
      - --distributed-executor-backend
      - "${VLLM_DISTRIBUTED_EXECUTOR_BACKEND:-mp}"
      - --metrics
    volumes:
      - ./models:/models:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  analyzer:
    build:
      context: ../..
      dockerfile: llm_notable_analysis_analyzer_image/Dockerfile.analyzer
    restart: unless-stopped
    user: "${CONTAINER_UID:-1000}:${CONTAINER_GID:-1000}"
    env_file:
      - ./config/config.env
    depends_on:
      model-serving:
        condition: service_healthy
    volumes:
      - ./data/incoming:/watch/incoming
      - ./data/processed:/watch/processed
      - ./data/quarantine:/watch/quarantine
      - ./data/reports:/watch/reports
      - ./data/archive:/watch/archive
      - ./kb/index:/kb/index:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import requests; requests.get('http://model-serving:8000/health', timeout=5).raise_for_status(); required = ['/watch/incoming', '/watch/processed', '/watch/quarantine', '/watch/reports', '/watch/archive']; raise SystemExit(0 if all(Path(p).exists() for p in required) else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
